<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Analyzer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0c0f;
  --bg1:       #0f1318;
  --bg2:       #151a21;
  --bg3:       #1c2330;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #e2e8f0;
  --text2:     #8896a8;
  --text3:     #4f6070;
  --green:     #00e8a0;
  --green2:    #00b87a;
  --red:       #ff5c6c;
  --red2:      #cc3a49;
  --amber:     #ffb347;
  --blue:      #4ab3ff;
  --purple:    #b48aff;
  --teal:      #00d4c8;
  --font-mono: 'JetBrains Mono', monospace;
  --font-head: 'Syne', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanline overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* ── Header ── */
.header {
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg1);
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--green);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-icon svg { width: 18px; height: 18px; }

.logo-text {
  font-family: var(--font-head);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.logo-text span { color: var(--green); }

.header-meta {
  font-size: 11px;
  color: var(--text3);
  text-align: right;
  line-height: 1.6;
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-meta-text {
  text-align: right;
  line-height: 1.6;
}

.status-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 5px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

.load-btn {
  background: rgba(0,232,160,0.08);
  border: 1px solid rgba(0,232,160,0.2);
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.load-btn:hover {
  background: rgba(0,232,160,0.15);
  border-color: rgba(0,232,160,0.4);
  transform: translateY(-1px);
}

/* ── Layout ── */
.main {
  max-width: 1320px;
  margin: 0 auto;
  padding: 28px 32px 60px;
}

/* ── Section heading ── */
.section-title {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin: 36px 0 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Cards ── */
.card {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  transition: border-color 0.2s;
}

.card:hover { border-color: var(--border2); }

/* ── Stat tiles ── */
.tiles {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 6px;
}

@media (max-width: 900px) { .tiles { grid-template-columns: repeat(2, 1fr); } }

.tile {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 20px 18px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
  cursor: default;
}

.tile:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}

.tile-accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: 10px 10px 0 0;
}

.tile-label {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}

.tile-value {
  font-family: var(--font-head);
  font-size: 32px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -1px;
  margin-bottom: 6px;
}

.tile-sub {
  font-size: 11px;
  color: var(--text2);
}

/* ── Two-col grid ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
@media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* ── Bar chart (CSS-only) ── */
.bar-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }

.bar-row {
  display: grid;
  grid-template-columns: 140px 1fr 60px;
  gap: 10px;
  align-items: center;
  font-size: 12px;
}

.bar-label { color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.bar-track {
  background: var(--bg3);
  border-radius: 3px;
  height: 7px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  width: 0;
}

.bar-val { color: var(--text); text-align: right; font-variant-numeric: tabular-nums; }

/* ── Donut ── */
.donut-wrap { display: flex; align-items: center; gap: 28px; margin-top: 8px; }

.donut-svg { flex-shrink: 0; }

.donut-legend { display: flex; flex-direction: column; gap: 8px; }

.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }

.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

.legend-label { color: var(--text2); }

.legend-val { color: var(--text); margin-left: auto; padding-left: 16px; font-variant-numeric: tabular-nums; }

/* ── Latency badges ── */
.latency-row { display: flex; gap: 12px; margin-top: 8px; }

.lat-badge {
  flex: 1;
  background: var(--bg3);
  border-radius: 8px;
  padding: 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.lat-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }

.lat-val { font-family: var(--font-head); font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }

/* ── Sparkline ── */
.sparkline-wrap { margin-top: 10px; }

/* ── Status code grid ── */
.status-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

.status-pill {
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 12px;
  display: flex;
  gap: 8px;
  align-items: center;
  border: 1px solid transparent;
}

.status-code { font-weight: 600; }
.status-count { color: inherit; opacity: 0.7; }

/* ── Method ring ── */
.method-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

.method-row { display: flex; align-items: center; gap: 10px; }
.method-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 4px;
  min-width: 56px;
  text-align: center;
}
.method-bar-wrap { flex: 1; }

/* ── Hour chart ── */
.hour-chart {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 60px;
  margin-top: 12px;
}

.hour-bar {
  flex: 1;
  border-radius: 2px 2px 0 0;
  transition: opacity 0.2s;
  cursor: default;
  position: relative;
}

.hour-bar:hover { opacity: 0.7; }

.hour-tick { display: flex; justify-content: space-between; margin-top: 4px; }
.hour-tick span { font-size: 9px; color: var(--text3); }

/* ── Terminal footer ── */
.term-line {
  font-size: 11px;
  color: var(--text3);
  margin-top: 3px;
  line-height: 1.8;
}

.term-line .prompt { color: var(--green); margin-right: 6px; }
.term-line .cmd    { color: var(--text2); }
.term-line .out    { color: var(--text3); }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.tile, .card {
  animation: fadeUp 0.4s ease both;
}

/* ── Loading state ── */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 24px;
}

.spinner {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 3px solid var(--bg3);
  border-top-color: var(--green);
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 1px;
}

/* ── Drop zone / file picker ── */
.drop-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 50vh;
  gap: 20px;
  padding: 60px 40px;
}

.drop-area {
  border: 2px dashed var(--border2);
  border-radius: 16px;
  padding: 60px 80px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: var(--bg1);
  max-width: 520px;
  width: 100%;
}

.drop-area:hover,
.drop-area.drag-over {
  border-color: var(--green);
  background: rgba(0,232,160,0.03);
  transform: translateY(-2px);
}

.drop-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  background: rgba(0,232,160,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
}

.drop-icon svg {
  width: 26px;
  height: 26px;
  stroke: var(--green);
}

.drop-title {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.drop-sub {
  font-size: 11px;
  color: var(--text3);
  line-height: 1.6;
}

.drop-or {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.drop-hint {
  font-size: 11px;
  color: var(--text3);
  max-width: 400px;
  text-align: center;
  line-height: 1.6;
}

.drop-hint code {
  background: var(--bg3);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--green);
  font-size: 10px;
}

@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* ── Upload options ── */
.upload-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  max-width: 680px;
  width: 100%;
}

@media (max-width: 700px) { .upload-options { grid-template-columns: 1fr; } }

.upload-option {
  border: 2px dashed var(--border2);
  border-radius: 16px;
  padding: 40px 28px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: var(--bg1);
  position: relative;
}

.upload-option:hover,
.upload-option.drag-over {
  transform: translateY(-3px);
}

.upload-option.primary { border-color: rgba(0,232,160,0.15); }
.upload-option.primary:hover,
.upload-option.primary.drag-over {
  border-color: var(--green);
  background: rgba(0,232,160,0.03);
  box-shadow: 0 8px 32px rgba(0,232,160,0.08);
}

.upload-option.secondary { border-color: rgba(74,179,255,0.1); }
.upload-option.secondary:hover,
.upload-option.secondary.drag-over {
  border-color: var(--blue);
  background: rgba(74,179,255,0.03);
  box-shadow: 0 8px 32px rgba(74,179,255,0.08);
}

.upload-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
}

.upload-badge.recommended {
  background: rgba(0,232,160,0.12);
  color: var(--green);
  border: 1px solid rgba(0,232,160,0.2);
}

.upload-badge.alt {
  background: rgba(74,179,255,0.08);
  color: var(--blue);
  border: 1px solid rgba(74,179,255,0.15);
}

/* ── Progress UI ── */
.progress-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 20px;
}

.progress-container {
  width: 100%;
  max-width: 420px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.progress-title {
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 700;
}

.progress-pct {
  font-size: 13px;
  color: var(--green);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.progress-track {
  background: var(--bg3);
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
  margin-bottom: 14px;
}

.progress-fill {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--green2), var(--green));
  transition: width 0.3s ease;
  width: 0%;
}

.progress-sub {
  font-size: 11px;
  color: var(--text3);
  text-align: center;
}

.progress-filename {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 12px;
  text-align: center;
  word-break: break-all;
}

.analyzing-label {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
}

.analyzing-label .spinner {
  width: 16px;
  height: 16px;
  border-width: 2px;
}

.server-error-box {
  background: rgba(255,92,108,0.04);
  border: 1px solid rgba(255,92,108,0.15);
  border-radius: 16px;
  padding: 40px 32px;
  max-width: 480px;
  width: 100%;
  text-align: center;
}

.server-error-box code {
  background: var(--bg3);
  padding: 3px 8px;
  border-radius: 4px;
  color: var(--green);
  font-size: 11px;
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a0c0f" stroke-width="2.5" stroke-linecap="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </div>
    <div class="logo-text">log<span>analyzer</span></div>
  </div>
  <div class="header-meta">
    <div class="header-meta-text" id="header-info">
      <div><span class="status-dot"></span>waiting for data…</div>
    </div>
    <button class="load-btn" id="upload-log-btn" title="Upload a log file for analysis" style="background:rgba(0,232,160,0.12);border-color:rgba(0,232,160,0.3);">
      ↑ Upload Log
    </button>
    <button class="load-btn" id="load-btn" title="Load report.json">
      ↑ Load Report
    </button>
    <input type="file" id="log-file-input" style="display:none">
    <input type="file" id="file-input" accept=".json" style="display:none">
  </div>
</header>

<main class="main" id="dashboard-root">
  <!-- Loading state (shown initially) -->
  <div class="loading-screen" id="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading report data…</div>
  </div>
</main>

<script>
// ── Utility helpers ──────────────────────────────
function fmtNum(n) {
  if (n >= 1e9)  return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6)  return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3)  return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}

function fmtBytes(b) {
  if (b >= 1e12) return (b / (1024**4)).toFixed(1);
  if (b >= 1e9)  return (b / (1024**3)).toFixed(1);
  if (b >= 1e6)  return (b / (1024**2)).toFixed(1);
  if (b >= 1e3)  return (b / 1024).toFixed(1);
  return b.toString();
}

function fmtBytesSuffix(b) {
  if (b >= 1e12) return 'TB';
  if (b >= 1e9)  return 'GB';
  if (b >= 1e6)  return 'MB';
  if (b >= 1e3)  return 'KB';
  return 'B';
}

function fmtExact(n) {
  return n.toLocaleString();
}

// ── Adaptive labels based on log type ────────────
function getLabels(logType) {
  const t = (logType || 'nginx').toLowerCase();
  if (t === 'hdfs') return {
    endpoints: 'Top Components',
    statusCodes: 'Log Levels',
    methods: 'Operations',
    ips: 'Top Hosts',
    endpointKey: 'endpoint',
    ipKey: 'ip'
  };
  if (t === 'syslog') return {
    endpoints: 'Top Programs',
    statusCodes: 'Status Codes',
    methods: 'HTTP Methods',
    ips: 'Top Hosts',
    endpointKey: 'endpoint',
    ipKey: 'ip'
  };
  if (t === 'hpc') return {
    endpoints: 'Top Components',
    statusCodes: 'Log Levels',
    methods: 'Top Subsystems',
    ips: 'Top Nodes',
    endpointKey: 'endpoint',
    ipKey: 'ip'
  };
  if (t === 'universal') return {
    endpoints: 'Top Endpoints / Paths',
    statusCodes: 'Log Levels / Status',
    methods: 'Actions / Methods',
    ips: 'Top Clients / Hosts',
    endpointKey: 'endpoint',
    ipKey: 'ip'
  };
  return {
    endpoints: 'Top Endpoints',
    statusCodes: 'Status Codes',
    methods: 'HTTP Methods',
    ips: 'Top IPs',
    endpointKey: 'endpoint',
    ipKey: 'ip'
  };
}

function isNonHTTPType(logType) {
  const t = (logType || '').toLowerCase();
  return t === 'hdfs' || t === 'syslog' || t === 'universal' || t === 'hpc';
}

// ── Status code coloring ─────────────────────────
const httpStatusColors = {
  '2': { bg:'rgba(0,232,160,0.1)', border:'rgba(0,232,160,0.25)', text:'var(--green)' },
  '3': { bg:'rgba(74,179,255,0.1)', border:'rgba(74,179,255,0.25)', text:'var(--blue)' },
  '4': { bg:'rgba(255,92,108,0.1)', border:'rgba(255,92,108,0.25)', text:'var(--red)' },
  '5': { bg:'rgba(255,179,71,0.1)', border:'rgba(255,179,71,0.25)', text:'var(--amber)' }
};

const levelColors = {
  'INFO':    { bg:'rgba(0,232,160,0.1)',  border:'rgba(0,232,160,0.25)',  text:'var(--green)' },
  'WARN':    { bg:'rgba(255,179,71,0.1)', border:'rgba(255,179,71,0.25)', text:'var(--amber)' },
  'WARNING': { bg:'rgba(255,179,71,0.1)', border:'rgba(255,179,71,0.25)', text:'var(--amber)' },
  'ERROR':   { bg:'rgba(255,92,108,0.1)', border:'rgba(255,92,108,0.25)', text:'var(--red)' },
  'FATAL':   { bg:'rgba(255,92,108,0.1)', border:'rgba(255,92,108,0.25)', text:'var(--red)' },
  'DEBUG':   { bg:'rgba(74,179,255,0.1)', border:'rgba(74,179,255,0.25)', text:'var(--blue)' },
  'TRACE':   { bg:'rgba(180,138,255,0.1)', border:'rgba(180,138,255,0.25)', text:'var(--purple)' }
};

function getStatusColor(code, logType) {
  if (isNonHTTPType(logType)) {
    const upper = code.toUpperCase();
    return levelColors[upper] || httpStatusColors['3'];
  }
  return httpStatusColors[code[0]] || httpStatusColors['3'];
}

const methodColors = { GET:'#4ab3ff', POST:'#00e8a0', PUT:'#b48aff', DELETE:'#ff5c6c', HEAD:'#ffb347', PATCH:'#00d4c8' };

// ── Header update ────────────────────────────────
function updateHeader(data) {
  const info = document.getElementById('header-info');
  let logType = data.logType || 'nginx';
  if (data.subType) {
    logType = `${data.subType} (${logType})`;
  }
  const totalReqs = fmtExact(data.totalRequests || 0);
  const fileSize = data.totalBytes ? fmtBytes(data.totalBytes) + ' ' + fmtBytesSuffix(data.totalBytes) : '';
  const time = data.analysisTime != null ? data.analysisTime.toFixed(2) + 's' : '';
  const throughput = data.throughput ? fmtExact(data.throughput) + ' req/s' : '';

  let line1 = `<span class="status-dot"></span>${logType} log · analyzed`;
  let line2Parts = [`${totalReqs} entries`];
  if (fileSize) line2Parts.push(fileSize + ' file');
  if (time)     line2Parts.push(time);

  info.innerHTML = `<div>${line1}</div><div>${line2Parts.join(' · ')}</div>`;
}

// ── Main render function ─────────────────────────
function renderDashboard(data) {
  const root = document.getElementById('dashboard-root');
  const labels = getLabels(data.logType);
  const totalReqs = data.totalRequests || 0;
  const hasLatency = data.latency && (data.latency.p50 > 0 || data.latency.p95 > 0);

  updateHeader(data);

  // Build full HTML
  let html = '';

  // ── Overview tiles ──
  html += `<div class="section-title">Overview</div>`;
  html += `<div class="tiles">`;

  // Total Requests
  html += `
    <div class="tile" style="animation-delay:0.05s">
      <div class="tile-accent" style="background:var(--green)"></div>
      <div class="tile-label">Total Requests</div>
      <div class="tile-value" style="color:var(--green)">${fmtNum(totalReqs)}</div>
      <div class="tile-sub">${fmtExact(totalReqs)} log entries parsed</div>
    </div>`;

  // Error Rate
  const errRate = data.errorRate != null ? data.errorRate : 0;
  const clientErr = data.clientErrors || 0;
  const serverErr = data.serverErrors || 0;
  html += `
    <div class="tile" style="animation-delay:0.1s">
      <div class="tile-accent" style="background:var(--red)"></div>
      <div class="tile-label">Error Rate</div>
      <div class="tile-value" style="color:var(--red)">${errRate.toFixed(1)}%</div>
      <div class="tile-sub">${fmtNum(clientErr)} client · ${fmtNum(serverErr)} server errors</div>
    </div>`;

  // p95 Latency
  if (hasLatency) {
    const p50 = data.latency.p50 || 0;
    const p95 = data.latency.p95 || 0;
    const p99 = data.latency.p99 || 0;
    html += `
      <div class="tile" style="animation-delay:0.15s">
        <div class="tile-accent" style="background:var(--amber)"></div>
        <div class="tile-label">p95 Latency</div>
        <div class="tile-value" style="color:var(--amber)">${p95}<span style="font-size:14px;font-weight:400;color:var(--text2)">ms</span></div>
        <div class="tile-sub">p50: ${p50}ms · p99: ${p99}ms</div>
      </div>`;
  }

  // Data Transferred
  if (data.totalBytes) {
    const byteVal = fmtBytes(data.totalBytes);
    const byteSuf = fmtBytesSuffix(data.totalBytes);
    html += `
      <div class="tile" style="animation-delay:0.2s">
        <div class="tile-accent" style="background:var(--blue)"></div>
        <div class="tile-label">Data Transferred</div>
        <div class="tile-value" style="color:var(--blue)">${byteVal}<span style="font-size:14px;font-weight:400;color:var(--text2)">${byteSuf}</span></div>
        <div class="tile-sub">${fmtExact(data.totalBytes)} bytes total</div>
      </div>`;
  }

  // If no latency or no bytes, fill remaining tiles
  if (!hasLatency && !data.totalBytes) {
    // Parse errors tile
    html += `
      <div class="tile" style="animation-delay:0.15s">
        <div class="tile-accent" style="background:var(--amber)"></div>
        <div class="tile-label">Parse Errors</div>
        <div class="tile-value" style="color:var(--amber)">${fmtNum(data.parseErrors || 0)}</div>
        <div class="tile-sub">entries failed to parse</div>
      </div>`;
    // Throughput tile
    html += `
      <div class="tile" style="animation-delay:0.2s">
        <div class="tile-accent" style="background:var(--blue)"></div>
        <div class="tile-label">Throughput</div>
        <div class="tile-value" style="color:var(--blue)">${fmtNum(data.throughput || 0)}<span style="font-size:14px;font-weight:400;color:var(--text2)">/s</span></div>
        <div class="tile-sub">requests per second</div>
      </div>`;
  } else if (!hasLatency) {
    html += `
      <div class="tile" style="animation-delay:0.15s">
        <div class="tile-accent" style="background:var(--amber)"></div>
        <div class="tile-label">Parse Errors</div>
        <div class="tile-value" style="color:var(--amber)">${fmtNum(data.parseErrors || 0)}</div>
        <div class="tile-sub">entries failed to parse</div>
      </div>`;
  } else if (!data.totalBytes) {
    html += `
      <div class="tile" style="animation-delay:0.2s">
        <div class="tile-accent" style="background:var(--blue)"></div>
        <div class="tile-label">Throughput</div>
        <div class="tile-value" style="color:var(--blue)">${fmtNum(data.throughput || 0)}<span style="font-size:14px;font-weight:400;color:var(--text2)">/s</span></div>
        <div class="tile-sub">requests per second</div>
      </div>`;
  }

  html += `</div>`;

  // ── Traffic breakdown: Top IPs + Top Endpoints ──
  if ((data.topIPs && data.topIPs.length) || (data.topEndpoints && data.topEndpoints.length)) {
    html += `<div class="section-title" style="margin-top:32px">Traffic Breakdown</div>`;
    html += `<div class="grid-2">`;

    if (data.topIPs && data.topIPs.length) {
      html += `
        <div class="card" style="animation-delay:0.25s">
          <div class="section-title" style="margin:0 0 16px;font-size:10px">${labels.ips}</div>
          <div class="bar-list" id="ip-bars"></div>
        </div>`;
    }

    if (data.topEndpoints && data.topEndpoints.length) {
      html += `
        <div class="card" style="animation-delay:0.3s">
          <div class="section-title" style="margin:0 0 16px;font-size:10px">${labels.endpoints}</div>
          <div class="bar-list" id="ep-bars"></div>
        </div>`;
    }

    html += `</div>`;
  }

  // ── Response Analysis: Status Codes + Methods + Latency ──
  html += `<div class="section-title">Response Analysis</div>`;
  html += `<div class="grid-3">`;

  if (data.statusCodes && Object.keys(data.statusCodes).length) {
    html += `
      <div class="card" style="animation-delay:0.35s">
        <div class="section-title" style="margin:0 0 12px;font-size:10px">${labels.statusCodes}</div>
        <div class="status-grid" id="status-pills"></div>
      </div>`;
  }

  if (data.methods && Object.keys(data.methods).length) {
    html += `
      <div class="card" style="animation-delay:0.4s">
        <div class="section-title" style="margin:0 0 12px;font-size:10px">${labels.methods}</div>
        <div class="method-list" id="method-bars"></div>
      </div>`;
  }

  if (hasLatency) {
    const p50 = data.latency.p50 || 0;
    const p95 = data.latency.p95 || 0;
    const p99 = data.latency.p99 || 0;
    html += `
      <div class="card" style="animation-delay:0.45s">
        <div class="section-title" style="margin:0 0 12px;font-size:10px">Latency Percentiles</div>
        <div class="latency-row">
          <div class="lat-badge">
            <div class="lat-label">p50</div>
            <div class="lat-val" style="color:var(--green)">${p50}<span style="font-size:13px;color:var(--text2)">ms</span></div>
          </div>
          <div class="lat-badge">
            <div class="lat-label">p95</div>
            <div class="lat-val" style="color:var(--amber)">${p95}<span style="font-size:11px;color:var(--text2)">ms</span></div>
          </div>
          <div class="lat-badge">
            <div class="lat-label">p99</div>
            <div class="lat-val" style="color:var(--red)">${p99}<span style="font-size:11px;color:var(--text2)">ms</span></div>
          </div>
        </div>
        ${data.latencyHistogram && data.latencyHistogram.length ? `
        <div style="margin-top:18px">
          <div class="section-title" style="margin:0 0 10px;font-size:10px">Latency Distribution</div>
          <div id="lat-hist" style="display:flex;align-items:flex-end;gap:3px;height:52px"></div>
          <div style="display:flex;justify-content:space-between;margin-top:4px">
            <span style="font-size:9px;color:var(--text3)">0ms</span>
            <span style="font-size:9px;color:var(--text3)">5000ms+</span>
          </div>
        </div>` : ''}
      </div>`;
  }

  html += `</div>`;

  // ── Requests by hour ──
  if (data.requestsByHour && data.requestsByHour.length) {
    html += `<div class="section-title">Temporal Pattern</div>`;
    html += `
      <div class="card" style="animation-delay:0.5s">
        <div class="section-title" style="margin:0 0 4px;font-size:10px">Requests by Hour (UTC)</div>
        <div class="hour-chart" id="hour-chart"></div>
        <div class="hour-tick">
          <span>00:00</span><span>03:00</span><span>06:00</span>
          <span>09:00</span><span>12:00</span><span>15:00</span>
          <span>18:00</span><span>21:00</span><span>23:00</span>
        </div>
      </div>`;
  }

  // ── Terminal block (dynamic stats) ──
  const logType = (data.logType || 'nginx').toLowerCase();
  const analysisTime = data.analysisTime != null ? data.analysisTime.toFixed(2) : '—';
  const throughput = data.throughput ? fmtExact(data.throughput) : '—';
  const fileSize = data.totalBytes ? fmtBytes(data.totalBytes) + ' ' + fmtBytesSuffix(data.totalBytes) : '—';
  const parseErrors = data.parseErrors != null ? fmtExact(data.parseErrors) : '0';

  html += `<div class="section-title" style="margin-top:32px">Analysis Summary</div>`;
  html += `
    <div class="card" style="animation-delay:0.55s; background:var(--bg); border-color:var(--border);">
      <div class="term-line"><span class="prompt">$</span><span class="cmd">./log_analyzer input.log --format ${logType} -o report.json</span></div>
      <div class="term-line out">&nbsp;&nbsp;→ Log type: <span style="color:var(--blue)">${logType}</span> · file size: ${fileSize}</div>
      <div class="term-line out">&nbsp;&nbsp;→ Total entries: <span style="color:var(--text)">${fmtExact(totalReqs)}</span> · parse errors: ${parseErrors}</div>
      <div class="term-line out">&nbsp;&nbsp;→ Error rate: <span style="color:var(--red)">${(data.errorRate || 0).toFixed(1)}%</span> (${fmtExact(data.clientErrors || 0)} client / ${fmtExact(data.serverErrors || 0)} server)</div>
      <div class="term-line out">&nbsp;&nbsp;→ <span style="color:var(--green)">${throughput}</span> throughput · ${analysisTime} total</div>
      <div class="term-line out">&nbsp;&nbsp;→ JSON report written to: <span style="color:var(--green)">report.json</span></div>
    </div>`;

  // Inject HTML
  root.innerHTML = html;

  // ── Post-render: populate dynamic elements ──
  requestAnimationFrame(() => {
    // Bar charts
    if (data.topIPs && data.topIPs.length) {
      renderBars('ip-bars', data.topIPs, 'ip', 'var(--blue)');
    }
    if (data.topEndpoints && data.topEndpoints.length) {
      renderBars('ep-bars', data.topEndpoints, 'endpoint', 'var(--purple)');
    }

    // Status pills
    if (data.statusCodes && Object.keys(data.statusCodes).length) {
      renderStatusPills(data.statusCodes, data.logType);
    }

    // Method bars
    if (data.methods && Object.keys(data.methods).length) {
      renderMethods(data.methods, totalReqs);
    }

    // Latency histogram
    if (data.latencyHistogram && data.latencyHistogram.length) {
      renderLatencyHistogram(data.latencyHistogram);
    }

    // Hour chart
    if (data.requestsByHour && data.requestsByHour.length) {
      renderHourChart(data.requestsByHour);
    }
  });
}

// ── Bar charts ───────────────────────────────────
function renderBars(containerId, items, labelKey, color) {
  const el = document.getElementById(containerId);
  if (!el || !items.length) return;
  const max = items[0].count;
  items.slice(0, 8).forEach((item) => {
    const pct = (item.count / max * 100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label" title="${item[labelKey]}">${item[labelKey]}</div>
      <div class="bar-track"><div class="bar-fill" data-pct="${pct}"
        style="background:${color};width:0%"></div></div>
      <div class="bar-val">${fmtNum(item.count)}</div>`;
    el.appendChild(row);
  });
  requestAnimationFrame(() => {
    el.querySelectorAll('.bar-fill').forEach((b, idx) => {
      setTimeout(() => { b.style.width = b.dataset.pct + '%'; }, idx * 40);
    });
  });
}

// ── Status pills ─────────────────────────────────
function renderStatusPills(statusCodes, logType) {
  const container = document.getElementById('status-pills');
  if (!container) return;
  const sorted = Object.entries(statusCodes).sort((a,b) => b[1] - a[1]);
  sorted.forEach(([code, count]) => {
    const c = getStatusColor(code, logType);
    const pill = document.createElement('div');
    pill.className = 'status-pill';
    pill.style.cssText = `background:${c.bg};border-color:${c.border};color:${c.text}`;
    pill.innerHTML = `<span class="status-code">${code}</span><span class="status-count">${fmtNum(count)}</span>`;
    container.appendChild(pill);
  });
}

// ── Method bars ──────────────────────────────────
function renderMethods(methods, totalReqs) {
  const container = document.getElementById('method-bars');
  if (!container) return;
  const sorted = Object.entries(methods).sort((a,b) => b[1] - a[1]);
  sorted.forEach(([method, count]) => {
    const pct = totalReqs > 0 ? (count / totalReqs * 100).toFixed(1) : '0.0';
    const color = methodColors[method] || '#8896a8';
    const row = document.createElement('div');
    row.className = 'method-row';
    row.innerHTML = `
      <div class="method-tag" style="background:${color}22;color:${color};border:1px solid ${color}44">${method}</div>
      <div class="method-bar-wrap">
        <div class="bar-track"><div class="bar-fill" data-pct="${pct}"
          style="background:${color};width:0%"></div></div>
      </div>
      <div style="font-size:11px;color:var(--text2);min-width:36px;text-align:right">${pct}%</div>`;
    container.appendChild(row);
  });
  requestAnimationFrame(() => {
    container.querySelectorAll('.bar-fill').forEach((b,i) => {
      setTimeout(() => { b.style.width = b.dataset.pct + '%'; }, i*60);
    });
  });
}

// ── Latency histogram ────────────────────────────
function renderLatencyHistogram(histogram) {
  const el = document.getElementById('lat-hist');
  if (!el) return;
  const maxH = Math.max(...histogram);
  histogram.forEach((v, i) => {
    const pct = maxH > 0 ? (v / maxH * 100) : 0;
    const bar = document.createElement('div');
    const color = i < 5 ? 'var(--green)' : i < 12 ? 'var(--amber)' : 'var(--red)';
    bar.style.cssText = `flex:1;height:${Math.max(pct,2)}%;background:${color};
      border-radius:2px 2px 0 0;opacity:0.8;transition:height 0.6s ease`;
    bar.title = `${v.toLocaleString()} requests`;
    el.appendChild(bar);
  });
}

// ── Hour chart ───────────────────────────────────
function renderHourChart(requestsByHour) {
  const el = document.getElementById('hour-chart');
  if (!el) return;
  const maxHour = Math.max(...requestsByHour);
  requestsByHour.forEach((count, h) => {
    const pct = (count / maxHour * 100);
    const bar = document.createElement('div');
    bar.className = 'hour-bar';
    bar.style.cssText = `height:${Math.max(pct,4)}%;background:linear-gradient(to top,var(--teal),var(--blue));opacity:0.65`;
    bar.title = `${String(h).padStart(2,'0')}:00 — ${count.toLocaleString()} requests`;
    el.appendChild(bar);
  });
}

// ── Upload log file to server for analysis ───────
function uploadLogFile(file) {
  const root = document.getElementById('dashboard-root');
  const sizeMB = (file.size / 1024 / 1024).toFixed(0);

  root.innerHTML = `
    <div class="progress-screen">
      <div class="progress-container">
        <div class="progress-filename">${file.name} (${sizeMB} MB)</div>
        <div class="progress-header">
          <div class="progress-title" id="progress-title">Uploading…</div>
          <div class="progress-pct" id="progress-pct">0%</div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-sub" id="progress-sub">Preparing upload…</div>
      </div>
    </div>`;

  const pctEl = document.getElementById('progress-pct');
  const fillEl = document.getElementById('progress-fill');
  const subEl = document.getElementById('progress-sub');
  const titleEl = document.getElementById('progress-title');

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/analyze?filename=' + encodeURIComponent(file.name));
  xhr.setRequestHeader('Content-Type', 'application/octet-stream');

  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      const pct = Math.round(e.loaded / e.total * 100);
      pctEl.textContent = pct + '%';
      fillEl.style.width = pct + '%';
      const loadedMB = (e.loaded / 1024 / 1024).toFixed(0);
      const totalMB = (e.total / 1024 / 1024).toFixed(0);
      subEl.textContent = loadedMB + ' / ' + totalMB + ' MB uploaded';
    }
  };

  xhr.upload.onload = () => {
    titleEl.textContent = 'Analyzing…';
    pctEl.textContent = '';
    fillEl.style.width = '100%';
    fillEl.style.background = 'linear-gradient(90deg, var(--green2), var(--green), var(--green2))';
    fillEl.style.backgroundSize = '200% 100%';
    fillEl.style.animation = 'shimmer 1.5s ease-in-out infinite';
    subEl.innerHTML = '<div class="analyzing-label"><div class="spinner"></div>Running log_analyzer…</div>';
  };

  xhr.onload = () => {
    if (xhr.status === 200) {
      try {
        const data = JSON.parse(xhr.responseText);
        renderDashboard(data);
      } catch (err) {
        showUploadError('Invalid response from server: ' + err.message);
      }
    } else {
      let msg = 'Server error (HTTP ' + xhr.status + ')';
      try {
        const errData = JSON.parse(xhr.responseText);
        if (errData.error) msg = errData.error;
      } catch (_) {}
      showUploadError(msg);
    }
  };

  xhr.onerror = () => {
    showUploadError(
      'Could not connect to the server.\n\nMake sure the server is running:\npython3 server.py'
    );
  };

  xhr.send(file);
}

// ── Drop zone UI ─────────────────────────────────
function showDropZone() {

              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <div class="drop-title">Upload Log File</div>
          <div class="drop-sub">

            Analyzed by the server automatically

        </div>

          <div class="drop-icon" style="background:rgba(74,179,255,0.08)">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
          </div>
          <div class="drop-title">Load Report JSON</div>
          <div class="drop-sub">
            Drop a <strong>report.json</strong> here<br>
            No server needed
          </div>
        </div>
      </div>
      <div class="drop-hint" style="margin-top:24px">
        Start the server: <code>python3 server.py</code> then upload log files directly
      </div>
    </div>`;

  // Log file drop area
  const dropLog = document.getElementById('drop-log');
  dropLog.addEventListener('click', () => document.getElementById('log-file-input').click());
  dropLog.addEventListener('dragover', (e) => { e.preventDefault(); dropLog.classList.add('drag-over'); });
  dropLog.addEventListener('dragleave', () => dropLog.classList.remove('drag-over'));
  dropLog.addEventListener('drop', (e) => {

    const file = e.dataTransfer.files[0];

  // JSON report drop area
  const dropJson = document.getElementById('drop-json');
  dropJson.addEventListener('click', () => document.getElementById('file-input').click());
  dropJson.addEventListener('dragover', (e) => { e.preventDefault(); dropJson.classList.add('drag-over'); });
  dropJson.addEventListener('dragleave', () => dropJson.classList.remove('drag-over'));
  dropJson.addEventListener('drop', (e) => {
    e.preventDefault(); dropJson.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });
}

// ── File reading helper (for JSON reports) ───────
function readFile(file) {
  const root = document.getElementById('dashboard-root');
  root.innerHTML = `
    <div class="loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">Parsing ${file.name}…</div>
    </div>`;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      renderDashboard(data);
    } catch (err) {
      root.innerHTML = `
        <div class="drop-zone">
          <div class="server-error-box">
            <div class="drop-icon" style="background:rgba(255,92,108,0.08)">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
              </svg>
            </div>
            <div class="drop-title" style="color:var(--red)">Invalid JSON</div>
            <div class="drop-sub">${err.message}</div>
            <button class="load-btn" onclick="showDropZone()" style="margin-top:16px">← Try Again</button>
          </div>
        </div>`;
    }
  };
  reader.readAsText(file);
}

// ── File input + button wiring ───────────────────
document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) readFile(file);
});

document.getElementById('log-file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) uploadLogFile(file);
});

document.getElementById('load-btn').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('upload-log-btn').addEventListener('click', () => {
  document.getElementById('log-file-input').click();
});

// ── Bootstrap: try fetch, fallback to drop zone ──
(async function init() {
  try {
    const resp = await fetch('report.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    renderDashboard(data);
  } catch (e) {
    console.info('Auto-fetch failed (expected on file://):', e.message);
    showDropZone();
  }
})();
</script>
</body>
</html>
